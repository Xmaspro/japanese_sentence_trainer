<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日语句练室</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="课程导航">
        <div class="brand">
          <div class="brand-mark">日</div>
          <div>
            <h1>日语句练室</h1>
            <p>句子输出训练</p>
          </div>
        </div>

        <nav class="course-list" id="courseList" aria-label="句子包"></nav>

        <section class="asset-panel" aria-label="真实素材">
          <img
            src="../content_archive/2026-05-28/daily_japanese_news-1.png"
            alt="日语新闻素材预览"
          />
          <div>
            <span>真实素材</span>
            <strong>新闻句子库</strong>
          </div>
        </section>
      </aside>

      <main class="practice-area">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="courseEyebrow">今日练习</p>
            <h2 id="lessonTitle">N5 基础句</h2>
          </div>
          <div class="progress-strip" aria-label="学习统计">
            <div>
              <span id="doneCount">0</span>
              <small>完成</small>
            </div>
            <div>
              <span id="accuracyCount">0%</span>
              <small>正确率</small>
            </div>
            <div>
              <span id="streakCount">0</span>
              <small>连击</small>
            </div>
          </div>
        </header>

        <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="练习模式">
          <button class="mode-tab is-active" data-mode="translate" type="button">中译日</button>
          <button class="mode-tab" data-mode="dictation" type="button">听写</button>
          <button class="mode-tab" data-mode="particle" type="button">助词</button>
          <button class="mode-tab" data-mode="shadow" type="button">跟读</button>
          <button class="mode-tab" data-mode="pattern" type="button">替换</button>
        </div>

        <section class="trainer" aria-live="polite">
          <div class="sentence-meta">
            <span id="levelPill">N5</span>
            <span id="sentencePosition">1 / 1</span>
          </div>

          <div class="prompt-block">
            <p class="prompt-label" id="promptLabel">中文提示</p>
            <div class="prompt-text" id="promptText"></div>
            <div class="kana-line" id="kanaLine"></div>
          </div>

          <label class="answer-label" for="answerInput" id="answerLabel">你的日语</label>
          <textarea
            id="answerInput"
            autocomplete="off"
            spellcheck="false"
            placeholder="在这里输入答案"
          ></textarea>

          <div class="action-row">
            <button class="icon-button" id="playButton" type="button" title="播放日语" aria-label="播放日语">
              <span>音</span>
            </button>
            <button class="tool-button" id="hintButton" type="button">提示</button>
            <button class="primary-button" id="checkButton" type="button">提交</button>
            <button class="tool-button" id="nextButton" type="button">下一句</button>
          </div>

          <div class="feedback" id="feedbackPanel">
            <div class="feedback-title">准备开始</div>
            <div class="feedback-body">等待输入。</div>
          </div>
        </section>

        <section class="sentence-deck" aria-label="句子列表">
          <div class="section-head">
            <h3>今日句子</h3>
            <button id="shuffleButton" type="button">乱序</button>
          </div>
          <div class="deck-list" id="deckList"></div>
        </section>
      </main>

      <aside class="coach-panel" aria-label="讲解与错题">
        <section class="coach-box">
          <div class="section-head">
            <h3>讲解</h3>
            <button id="explainButton" type="button">刷新</button>
          </div>
          <div class="explain-list" id="explainList"></div>
        </section>

        <section class="coach-box">
          <div class="section-head">
            <h3>错因</h3>
            <button id="clearMistakesButton" type="button">清空</button>
          </div>
          <div class="mistake-list" id="mistakeList"></div>
        </section>

        <section class="coach-box">
          <h3>助词雷达</h3>
          <div class="radar" id="particleRadar"></div>
        </section>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
