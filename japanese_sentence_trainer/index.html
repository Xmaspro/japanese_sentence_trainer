<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日语句练室</title>
    <link rel="stylesheet" href="styles.css?v=202605301820" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="sidebar" aria-label="课程导航">
        <div class="brand">
          <div class="brand-mark">日</div>
          <div>
            <h1>日语句练室</h1>
            <p>句子输出训练</p>
          </div>
        </div>

        <nav class="course-list" id="courseList" aria-label="句子包"></nav>

        <details class="settings-details">
          <summary>
            <h3>语音配置</h3>
            <button id="saveVoiceButton" type="button" onclick="event.stopPropagation()">保存</button>
          </summary>
          <div class="settings-content">
            <div class="voice-settings">
              <label>
                <span>模式</span>
                <select id="voiceProvider">
                  <option value="microsoft">微软语音 API</option>
                  <option value="voicevox">VOICEVOX (本地免费)</option>
                  <option value="browser">浏览器语音</option>
                </select>
              </label>
              <label>
                <span>Region</span>
                <input id="speechRegion" autocomplete="off" placeholder="japaneast" />
              </label>
              <label>
                <span>API Key</span>
                <input id="speechKey" autocomplete="off" placeholder="保存到本机浏览器" type="password" />
              </label>
              <label>
                <span>默认 Voice</span>
                <input id="speechVoice" autocomplete="off" placeholder="ja-JP-NanamiNeural" />
              </label>
              <label>
                <span>Speaker A Voice</span>
                <input id="speakerAVoice" autocomplete="off" placeholder="ja-JP-NanamiNeural" />
              </label>
              <label>
                <span>Speaker B Voice</span>
                <input id="speakerBVoice" autocomplete="off" placeholder="ja-JP-KeitaNeural" />
              </label>
              <p id="voiceStatus">未配置或不可用时自动回退到浏览器语音。VOICEVOX 模式下音色填数字 ID 即可（如2为四国めたん，3为ずんだもん）。</p>
            </div>
          </div>
        </details>

        <details class="settings-details">
          <summary>
            <h3>Gemini 配置</h3>
            <button id="saveGeminiButton" type="button" onclick="event.stopPropagation()">保存</button>
          </summary>
          <div class="settings-content">
            <div class="voice-settings">
              <label>
                <span>API Key</span>
                <input id="geminiKey" autocomplete="off" placeholder="保存到本机浏览器" type="password" />
              </label>
              <label>
                <span>Model</span>
                <input id="geminiModel" autocomplete="off" placeholder="gemini-1.5-flash" />
              </label>
              <p id="geminiStatus">填写后点击讲解刷新，可生成词汇和文法说明。</p>
            </div>
          </div>
        </details>

      </aside>

      <main class="practice-area">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="courseEyebrow">对话主题</p>
            <h2 id="lessonTitle">N5 基础句</h2>
          </div>
        </header>

        <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="练习模式">
          <button class="mode-tab is-active" data-mode="dictation" type="button">听写</button>
          <button class="mode-tab" data-mode="pattern" type="button">自由表达</button>
        </div>

        <section class="trainer" aria-live="polite">
          <div class="sentence-meta">
            <span id="levelPill">N5</span>
            <span id="sentencePosition">1 / 1</span>
          </div>

          <div class="chat-thread" id="dialogueThread" aria-label="当前对话"></div>
          <div class="kana-line" id="kanaLine"></div>
        </section>

      </main>

      <aside class="coach-panel" aria-label="讲解与错题">
        <section class="coach-box progress-box">
          <div class="section-head">
            <h3>学习进度</h3>
            <span id="progressSummary">0 / 0</span>
          </div>
          <div class="side-progress-bar"><span id="sideProgressBar"></span></div>
          <p id="sideProgressPercent">0%</p>
        </section>

        <section class="coach-box practice-box">
          <div class="section-head">
            <h3>听到的日语</h3>
          </div>
          <label class="answer-label" for="answerInput" id="answerLabel">你的日语</label>
          <textarea
            id="answerInput"
            autocomplete="off"
            spellcheck="false"
            placeholder="在这里输入答案"
          ></textarea>

          <div class="action-row">
            <button class="icon-button" id="playButton" type="button" title="播放日语" aria-label="播放日语">
              <span>音</span>
            </button>
            <button class="icon-button" id="recordButton" type="button" title="录音/停止" aria-label="录音">
              <span>录</span>
            </button>
            <button class="icon-button" id="playRecordingButton" type="button" title="播放我的录音" aria-label="播放我的录音" disabled>
              <span>我</span>
            </button>
            <button class="primary-button" id="checkButton" type="button">提交</button>
            <button class="tool-button" id="prevButton" type="button">上一句</button>
            <button class="tool-button" id="nextButton" type="button">下一句</button>
          </div>

          <div class="group-jump">
            <button class="tool-button" id="prevGroupButton" type="button">上一组</button>
            <label>
              <span>跳转组</span>
              <input id="jumpGroupInput" type="number" min="1" value="1" />
            </label>
            <button class="tool-button" id="jumpGroupButton" type="button">进入</button>
            <button class="tool-button" id="nextGroupButton" type="button">下一组</button>
          </div>

          <div class="feedback" id="feedbackPanel">
            <div class="feedback-title">准备开始</div>
            <div class="feedback-body">等待输入。</div>
          </div>
        </section>

        <section class="coach-box">
          <div class="section-head">
            <h3>讲解</h3>
            <button id="explainButton" type="button">刷新</button>
          </div>
          <div class="explain-list" id="explainList"></div>
        </section>
      </aside>
    </div>

    <script src="curriculum.js?v=202605301820"></script>
    <script src="trainer_core.js?v=202605301820"></script>
    <script src="app.js?v=202605301906"></script>
  </body>
</html>
